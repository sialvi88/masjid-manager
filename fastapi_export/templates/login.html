<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لاگ ان - مسجد و مدرسہ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen font-sans">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">ایڈمن لاگ ان</h2>
            <p class="text-gray-500 text-sm mt-1">سسٹم میں داخل ہونے کے لیے تفصیلات درج کریں</p>
        </div>
        <form action="/admin/login" method="post" class="space-y-4">
            <div>
                <label class="block mb-1 text-sm font-medium text-gray-700">یوزر نیم</label>
                <input type="text" name="username" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
            </div>
            <div>
                <label class="block mb-1 text-sm font-medium text-gray-700">پاس ورڈ</label>
                <input type="password" name="password" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg hover:bg-blue-700 transition-colors mt-4">لاگ ان کریں</button>
        </form>
    </div>
</body>
</html>
