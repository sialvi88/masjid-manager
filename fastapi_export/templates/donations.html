<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ڈونیشنز</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-blue-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-6">
                    <span class="font-bold text-xl">مسجد و مدرسہ</span>
                    <a href="/dashboard" class="hover:bg-blue-600 px-3 py-2 rounded-md font-medium">ڈیش بورڈ</a>
                    <a href="/donations" class="bg-blue-800 px-3 py-2 rounded-md font-medium">ڈونیشنز</a>
                    <a href="/expenses" class="hover:bg-blue-600 px-3 py-2 rounded-md font-medium">اخراجات</a>
                    <a href="/reports" class="hover:bg-blue-600 px-3 py-2 rounded-md font-medium">رپورٹس</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-bold text-gray-800 mb-6">نئی ڈونیشن شامل کریں</h2>
                    <form action="/donation" method="post" class="space-y-4">
                        <div>
                            <label class="block mb-1 text-sm font-medium text-gray-700">عطیہ دہندہ کا نام</label>
                            <input type="text" name="donor_name" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                        </div>
                        <div>
                            <label class="block mb-1 text-sm font-medium text-gray-700">رقم (Rs)</label>
                            <input type="number" name="amount" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                        </div>
                        <div>
                            <label class="block mb-1 text-sm font-medium text-gray-700">تاریخ</label>
                            <input type="date" name="date_str" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                        </div>
                        <button type="submit" class="w-full bg-green-600 text-white font-bold p-3 rounded-lg hover:bg-green-700 transition-colors mt-4">محفوظ کریں</button>
                    </form>
                </div>
            </div>

            <!-- Table -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b border-gray-100">
                        <h2 class="text-xl font-bold text-gray-800">حالیہ ڈونیشنز</h2>
                    </div>
                    <table class="w-full text-right">
                        <thead class="bg-gray-50 text-gray-600 text-sm">
                            <tr>
                                <th class="p-4 font-medium">نام</th>
                                <th class="p-4 font-medium">رقم</th>
                                <th class="p-4 font-medium">تاریخ</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            {% for d in donations %}
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="p-4 text-gray-800">{{ d.donor_name }}</td>
                                <td class="p-4 text-green-600 font-medium">Rs {{ d.amount }}</td>
                                <td class="p-4 text-gray-500">{{ d.date }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
