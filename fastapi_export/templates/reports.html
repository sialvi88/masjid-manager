<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>

    <title>رپورٹس</title>

</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-blue-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="/reports/excel" class="bg-green-600 text-white px-6 py-3 rounded-lg shadow hover:bg-green-700 transition-colors font-medium flex items-center justify-center gap-2">
