<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ڈیش بورڈ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-blue-700 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-6">
                    <span class="font-bold text-xl">مسجد و مدرسہ</span>
                    <a href="/dashboard" class="bg-blue-800 px-3 py-2 rounded-md font-medium">ڈیش بورڈ</a>
                    <a href="/donations" class="hover:bg-blue-600 px-3 py-2 rounded-md font-medium">ڈونیشنز</a>
                    <a href="/expenses" class="hover:bg-blue-600 px-3 py-2 rounded-md font-medium">اخراجات</a>
                    <a href="/reports" class="hover:bg-blue-600 px-3 py-2 rounded-md font-medium">رپورٹس</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">ڈیش بورڈ کا جائزہ</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-medium text-gray-500 mb-2">کل آمدنی (ڈونیشنز)</h2>
                <p class="text-4xl font-bold text-green-600">Rs {{ total_donations }}</p>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-medium text-gray-500 mb-2">کل اخراجات</h2>
                <p class="text-4xl font-bold text-red-600">Rs {{ total_expenses }}</p>
            </div>
        </div>
    </div>
</body>
</html>
